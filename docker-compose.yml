services:
  anthronim:
    build: .
    ports:
      - "${PORT:-8787}:8787"
    env_file:
      - .env
    volumes:
      - ./docker-data:/app/data
    environment:
      - DB_PATH=/app/data/anthronim.db
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  dev:
    build:
      context: .
      target: builder
    user: "node"
    ports:
      - "${PORT:-8787}:8787"
    env_file:
      - .env
    volumes:
      - ./index.js:/app/index.js
      - ./db.js:/app/db.js
      - ./admin.js:/app/admin.js
      - ./admin.html:/app/admin.html
      - ./index.html:/app/index.html
      - ./logs.html:/app/logs.html
      - ./docker-data:/app/data
    environment:
      - DB_PATH=/app/data/anthronim.db
    command: node --watch index.js
    profiles:
      - dev
